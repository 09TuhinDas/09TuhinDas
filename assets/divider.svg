<svg width="1200" height="6" viewBox="0 0 1200 6" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <linearGradient id="dg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(0,212,255,0)"/>
      <stop offset="20%"  stop-color="#00D4FF"/>
      <stop offset="50%"  stop-color="#7928CA"/>
      <stop offset="80%"  stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="rgba(0,212,255,0)"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect y="2" width="1200" height="2" fill="url(#dg)" opacity="0.65" filter="url(#glow)"/>
</svg>